<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>capacitor-geoar example</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <style>
      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #fff;
        /* When the session is active, body becomes transparent so the camera preview
           (which the plugin places behind the WebView) shines through. */
        background: #111;
      }
      body.session-active { background: transparent; }

      /* Status bar — heading/pitch/roll/accuracy/FOV/Hz readout. */
      .status {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding: env(safe-area-inset-top, 12px) 12px 8px;
        background: rgba(0, 0, 0, 0.55);
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        backdrop-filter: blur(6px);
      }
      .status .k { opacity: 0.65; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
      .status .v { font-size: 15px; font-weight: 600; }

      /* Center crosshair. */
      .crosshair {
        position: fixed;
        left: 50%; top: 50%;
        width: 24px; height: 24px;
        margin: -12px 0 0 -12px;
        border: 2px solid rgba(255, 255, 255, 0.85);
        border-radius: 50%;
        pointer-events: none;
      }
      .crosshair::before, .crosshair::after {
        content: ''; position: absolute; background: rgba(255, 255, 255, 0.85);
      }
      .crosshair::before { left: 50%; top: -10px; bottom: -10px; width: 2px; margin-left: -1px; }
      .crosshair::after { top: 50%; left: -10px; right: -10px; height: 2px; margin-top: -1px; }

      /* Horizon line — driven by pitch. */
      .horizon {
        position: fixed;
        left: 0; right: 0;
        height: 1px;
        background: rgba(255, 200, 0, 0.6);
        box-shadow: 0 0 6px rgba(255, 200, 0, 0.4);
        pointer-events: none;
        will-change: transform;
        display: none;
      }
      body.session-active .horizon { display: block; }

      /* Cardinal direction markers — driven by heading + FOV. */
      .marker {
        position: fixed;
        top: 50%;
        transform: translate(-50%, -50%);
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.4);
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.04em;
        pointer-events: none;
        display: none;
        will-change: left, top;
      }
      body.session-active .marker { display: block; }
      .marker[data-bearing="0"]   { color: #ff5d5d; }
      .marker[data-bearing="90"]  { color: #5dd6ff; }
      .marker[data-bearing="180"] { color: #ffd25d; }
      .marker[data-bearing="270"] { color: #b9ff5d; }

      /* Bottom controls + log. */
      .controls {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        padding: 12px 12px env(safe-area-inset-bottom, 12px);
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(6px);
      }
      .row { display: flex; gap: 8px; align-items: center; }
      button {
        flex: 1;
        padding: 12px 16px;
        border-radius: 10px;
        border: none;
        background: #2d6cdf;
        color: #fff;
        font-weight: 600;
        font-size: 15px;
      }
      button[disabled] { background: #555; opacity: 0.7; }
      button.secondary { background: #444; }

      .log {
        margin-top: 8px;
        max-height: 22vh;
        overflow-y: auto;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        line-height: 1.4;
        opacity: 0.85;
      }
      .log .line { padding: 2px 0; }
      .log .err { color: #ff8a8a; }
      .log .ok  { color: #95ffa9; }
    </style>
  </head>
  <body>
    <!-- Status readout -->
    <div class="status">
      <div><div class="k">Heading</div><div class="v" id="heading">–</div></div>
      <div><div class="k">Pitch</div><div class="v" id="pitch">–</div></div>
      <div><div class="k">Roll</div><div class="v" id="roll">–</div></div>
      <div><div class="k">Accuracy</div><div class="v" id="accuracy">–</div></div>
    </div>

    <!-- AR overlay layer -->
    <div class="horizon" id="horizon"></div>
    <div class="marker" id="marker-N" data-bearing="0">N</div>
    <div class="marker" id="marker-E" data-bearing="90">E</div>
    <div class="marker" id="marker-S" data-bearing="180">S</div>
    <div class="marker" id="marker-W" data-bearing="270">W</div>
    <div class="crosshair"></div>

    <!-- Controls + log -->
    <div class="controls">
      <div class="row">
        <button id="btn-start">Start AR session</button>
        <button id="btn-stop" class="secondary" disabled>Stop</button>
      </div>
      <div class="log" id="log"></div>
    </div>

    <script src="./js/example.js" type="module"></script>
  </body>
</html>
